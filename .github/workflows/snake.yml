name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 China Standard Time.
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate animated snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: zcxGGmu
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=%237B1FA2&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216e39&color_background=%23ffffff
            dist/github-contribution-grid-snake-dark.gif?color_snake=%23c084fc&color_dots=%23161b22,%2321262d,%2330363d,%238b949e,%23c084fc&color_background=%230d1117

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
